<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product | Kandyan Gem & Jewellers</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .product-detail {
            padding: calc(var(--nav-height) + 3rem) 0 5rem;
            background: var(--dark-200);
        }

        .product-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }

        .product-main-img {
            width: 100%;
            border-radius: var(--radius-xl);
            aspect-ratio: 1/1;
            object-fit: cover;
            background: var(--dark-300);
            margin-bottom: 1rem;
        }

        .thumb-strip {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .thumb-strip::-webkit-scrollbar {
            display: none;
        }

        .thumb {
            width: 70px;
            height: 70px;
            border-radius: var(--radius-md);
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color var(--transition-fast);
            flex-shrink: 0;
            background: var(--dark-300);
        }

        .thumb.active {
            border-color: var(--gold-400);
        }

        .product-info {
            position: sticky;
            top: calc(var(--nav-height)+2rem);
        }

        .product-cat {
            margin-bottom: 0.5rem;
        }

        .product-title {
            font-family: var(--font-serif);
            font-size: clamp(1.75rem, 3vw, 2.5rem);
            margin-bottom: 1rem;
        }

        .product-price-block {
            margin: 1.5rem 0;
        }

        .product-price {
            font-family: var(--font-serif);
            font-size: 2rem;
            color: var(--gold-400);
        }

        .product-price-orig {
            font-size: 1.1rem;
            color: var(--cream-300);
            text-decoration: line-through;
            opacity: 0.6;
            margin-left: 0.75rem;
        }

        .disc-pill {
            display: inline-block;
            background: var(--ruby);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 999px;
            margin-left: 0.75rem;
            vertical-align: middle;
        }

        .offer-banner {
            background: linear-gradient(135deg, rgba(212, 160, 23, 0.12), rgba(212, 160, 23, 0.05));
            border: 1px solid rgba(212, 160, 23, 0.3);
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .offer-banner i {
            color: var(--gold-400);
        }

        .offer-banner strong {
            color: var(--gold-400);
        }

        .speclist {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin: 1.5rem 0;
        }

        .spec-item {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .spec-label {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--cream-300);
            opacity: 0.6;
        }

        .spec-val {
            font-size: 0.9rem;
            color: var(--cream-100);
        }

        .action-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 2rem;
        }

        .action-row .btn {
            flex: 1;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            padding: 0.5rem 0.75rem;
            background: rgba(255, 255, 255, 0.04);
        }

        .guarantee-row {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .guarantee-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.78rem;
            color: var(--cream-300);
            opacity: 0.75;
        }

        .guarantee-item i {
            color: var(--gold-400);
        }

        .related-section {
            padding: 5rem 0;
            background: var(--dark-300);
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 2rem;
        }

        .tab-btn {
            padding: 0.85rem 1.75rem;
            background: none;
            color: var(--cream-300);
            opacity: 0.65;
            font-size: 0.875rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-bottom: 2px solid transparent;
            transition: all var(--transition-fast);
        }

        .tab-btn.active {
            color: var(--gold-400);
            opacity: 1;
            border-bottom-color: var(--gold-400);
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        @media(max-width:900px) {
            .product-layout {
                grid-template-columns: 1fr
            }

            .product-info {
                position: static
            }

            .speclist {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <div id="nav-placeholder"></div>
    <div id="cart-placeholder"></div>

    <div class="product-detail" id="product-page">
        <div class="container">
            <div class="breadcrumb" id="breadcrumb"></div>
            <div class="product-layout" id="product-layout">
                <div id="loading" style="text-align:center;padding:4rem;grid-column:1/-1">
                    <div class="spinner" style="margin:0 auto"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Related Products -->
    <section class="related-section">
        <div class="container">
            <div class="section-header">
                <span class="subtitle">You May Also Like</span>
                <div class="gold-divider">
                    <div class="diamond"></div>
                </div>
                <h2 class="display-md">Related Products</h2>
            </div>
            <div class="product-grid" id="related-grid" style="grid-template-columns:repeat(4,1fr)"></div>
        </div>
    </section>

    <footer class="site-footer" id="footer-placeholder">
        </div>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
        <script src="js/db.js"></script>
        <script src="js/store.js"></script>
        <script src="js/scroll.js"></script>
        <script src="js/cart.js"></script>
        <script src="js/components.js"></script>
        <script>
            let currentProduct;
            let qty = 1;

            async function initPage() {
                await KGJ.init();
                Components.init('shop');

                const urlParams = new URLSearchParams(window.location.search);
                const productId = urlParams.get('id');
                if (productId) {
                    const p = KGJ.getProduct(productId);
                    if (p) { renderProduct(p); renderRelated(p); }
                    else document.getElementById('product-layout').innerHTML = '<div style="text-align:center;padding:4rem;grid-column:1/-1;color:var(--cream-300)"><i class="fas fa-gem" style="font-size:3rem;display:block;margin-bottom:1rem"></i>Product not found. <a href="shop.html" style="color:var(--gold-400)">Browse our shop →</a></div>';
                } else {
                    window.location.href = 'shop.html';
                }
            }
            initPage();

            function renderProduct(p) {
                currentProduct = p;
                document.title = `${p.name} | Kandyan Gem & Jewellers`;
                const price = p.discountedPrice < p.price ? p.discountedPrice : p.price;
                const disc = p.discountedPrice < p.price ? Math.round((1 - p.discountedPrice / p.price) * 100) : 0;

                document.getElementById('breadcrumb').innerHTML = `
      <a href="index.html">Home</a><span class="sep">/</span>
      <a href="shop.html">Shop</a><span class="sep">/</span>
      <a href="shop.html?cat=${p.category}">${p.category}</a><span class="sep">/</span>
      <span style="color:var(--cream-100)">${p.name}</span>`;

                document.getElementById('product-layout').innerHTML = `
      <!-- Images -->
      <div class="reveal-left">
        <img src="${p.images[0]}" alt="${p.name}" class="product-main-img" id="main-img">
        <div class="thumb-strip">
          ${p.images.map((img, i) => `<img src="${img}" class="thumb ${i === 0 ? 'active' : ''}" onclick="switchImg('${img}',this)">`).join('')}
        </div>
      </div>
      <!-- Info -->
      <div class="product-info reveal-right">
        <div class="product-cat subtitle">${p.category}</div>
        <h1 class="product-title">${p.name}</h1>
        <div class="stars">${'★'.repeat(Math.round(p.rating || 5))}${'☆'.repeat(5 - Math.round(p.rating || 5))} <span style="color:var(--cream-300);opacity:0.6;font-size:0.8rem">(${p.reviews || 0} reviews)</span></div>

        <div class="product-price-block">
          <span class="product-price">${KGJ.fmt(price)}</span>
          ${disc > 0 ? `<span class="product-price-orig">${KGJ.fmt(p.price)}</span><span class="disc-pill">-${disc}%</span>` : ''}
        </div>

        ${p.specialOffer ? `<div class="offer-banner"><i class="fas fa-tag"></i><div><strong>${p.specialOffer}</strong>${p.offerExpiry ? ` — Ends ${new Date(p.offerExpiry).toLocaleDateString('en-LK', { day: 'numeric', month: 'long', year: 'numeric' })}` : ''}${!p.inStock ? '<span style="color:var(--ruby)"> — Out of Stock</span>' : ''}</div></div>` : ''}

        <div class="speclist">
          <div class="spec-item"><span class="spec-label">Metal</span><span class="spec-val">${p.metal || '—'}</span></div>
          <div class="spec-item"><span class="spec-label">Gemstone</span><span class="spec-val">${p.gemstone || '—'}</span></div>
          <div class="spec-item"><span class="spec-label">Weight</span><span class="spec-val">${p.weight || '—'}</span></div>
          <div class="spec-item"><span class="spec-label">Category</span><span class="spec-val">${p.category}</span></div>
        </div>

        <!-- Tabs: Description / Cert -->
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('desc',this)">Description</button>
          <button class="tab-btn" onclick="switchTab('cert',this)">Certification</button>
          <button class="tab-btn" onclick="switchTab('ship',this)">Delivery</button>
        </div>
        <div class="tab-pane active" id="tab-desc" style="color:var(--cream-300);line-height:1.8;font-size:0.95rem">${p.description}</div>
        <div class="tab-pane" id="tab-cert">
          <p style="color:var(--cream-300);font-size:0.9rem;line-height:1.8">All gemstones are certified by the <strong style="color:var(--cream-100)">Gemological Institute of Sri Lanka (GEMA)</strong> and the <strong style="color:var(--cream-100)">National Gem & Jewellery Authority</strong>. Certificates are included with your purchase.</p>
        </div>
        <div class="tab-pane" id="tab-ship">
          <ul style="color:var(--cream-300);font-size:0.9rem;line-height:2;list-style:disc;padding-left:1.25rem">
            <li>Free insured delivery on orders over Rs. 15,000</li>
            <li>Standard delivery Rs. 350 — 3–5 business days</li>
            <li>Cash on Delivery available island-wide</li>
            <li>30-day return policy on all items</li>
          </ul>
        </div>

        <!-- Quantity + Actions -->
        <div style="margin-top:1.75rem">
          <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
            <span style="font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--cream-300)">Qty</span>
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty(-1)"><i class="fas fa-minus"></i></button>
              <span class="qty-num" id="qty-display">1</span>
              <button class="qty-btn" onclick="changeQty(1)"><i class="fas fa-plus"></i></button>
            </div>
          </div>
          <div class="action-row">
            <button class="btn btn-primary" onclick="addToCart()"><i class="fas fa-shopping-bag"></i> Add to Cart</button>
            <button class="btn btn-outline" onclick="buyNow()"><i class="fas fa-bolt"></i> Buy Now</button>
            <button class="btn btn-ghost btn-icon" id="wish-btn" onclick="toggleWish()"><i class="fas fa-heart"></i></button>
          </div>
        </div>

        <div class="guarantee-row">
          <span class="guarantee-item"><i class="fas fa-certificate"></i>Certified Gem</span>
          <span class="guarantee-item"><i class="fas fa-undo"></i>30-Day Return</span>
          <span class="guarantee-item"><i class="fas fa-shield-alt"></i>Lifetime Buy-Back</span>
          <span class="guarantee-item"><i class="fas fa-truck"></i>Insured Delivery</span>
        </div>
      </div>`;

                updateWishBtn();
                ScrollEngine.initReveal();
            }

            function switchImg(src, el) {
                document.getElementById('main-img').src = src;
                document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
                el.classList.add('active');
            }

            function switchTab(id, btn) {
                document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                document.getElementById(`tab-${id}`).classList.add('active');
                btn.classList.add('active');
            }

            function changeQty(delta) {
                qty = Math.max(1, Math.min(10, qty + delta));
                document.getElementById('qty-display').textContent = qty;
            }

            function addToCart() {
                if (!currentProduct) return;
                for (let i = 0; i < qty; i++) Cart.addItem(currentProduct.id, 1);
            }

            function buyNow() {
                addToCart();
                Cart.closeDrawer();
                window.location.href = 'checkout.html';
            }

            function updateWishBtn() {
                const btn = document.getElementById('wish-btn');
                if (!btn || !currentProduct) return;
                btn.style.color = KGJ.isWishlisted(currentProduct.id) ? 'var(--ruby)' : '';
            }

            function toggleWish() {
                if (!currentProduct) return;
                KGJ.toggleWishlist(currentProduct.id);
                updateWishBtn();
                Cart.showToast(KGJ.isWishlisted(currentProduct.id) ? 'Added to wishlist!' : 'Removed from wishlist');
            }

            function renderRelated(p) {
                const related = KGJ.getByCategory(p.category).filter(r => r.id !== p.id).slice(0, 4);
                const grid = document.getElementById('related-grid');
                grid.innerHTML = related.map(r => {
                    const price = r.discountedPrice < r.price ? r.discountedPrice : r.price;
                    const disc = r.discountedPrice < r.price ? Math.round((1 - r.discountedPrice / r.price) * 100) : 0;
                    return `
        <div class="product-card" onclick="window.location='product.html?id=${r.id}'">
          <div class="img-wrap">
            <img src="${r.images[0]}" alt="${r.name}">
            ${disc > 0 ? `<div class="badges"><span class="badge-discount">-${disc}%</span></div>` : ''}
          </div>
          <div class="card-body">
            <div class="card-cat">${r.category}</div>
            <div class="card-name">${r.name}</div>
            <div class="price-row">
              <span class="price-current">${KGJ.fmt(price)}</span>
              ${disc > 0 ? `<span class="price-original">${KGJ.fmt(r.price)}</span>` : ''}
            </div>
          </div>
        </div>`;
                }).join('');
                if (related.length === 0) document.querySelector('.related-section').style.display = 'none';
            }

            // Load product
            if (productId) {
                const p = KGJ.getProduct(productId);
                if (p) { renderProduct(p); renderRelated(p); }
                else document.getElementById('product-layout').innerHTML = '<div style="text-align:center;padding:4rem;grid-column:1/-1;color:var(--cream-300)"><i class="fas fa-gem" style="font-size:3rem;display:block;margin-bottom:1rem"></i>Product not found. <a href="shop.html" style="color:var(--gold-400)">Browse our shop →</a></div>';
            } else {
                window.location.href = 'shop.html';
            }
        </script>
</body>

</html>
